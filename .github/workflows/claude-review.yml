name: Claude Code Review

on:
  issue_comment:
    types: [created]

jobs:
  claude-review:
    # Runs when someone comments "@claude review" on a PR
    if: |
       github.event_name == 'issue_comment' && 
       github.event.issue.pull_request && 
       contains(github.event.comment.body, '@claude review')
    permissions:
        contents: read
        pull-requests: write
        issues: write
        id-token: write
    runs-on:
        - runs-on=${{ github.run_id }}
        - runner=2cpu-linux-x64
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Full history for better diff analysis

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
            role-to-assume: ${{ secrets.AWS_OIDC_ROLE_ARN }}
            aws-region: us-east-1

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
            app-id: ${{ secrets.CLAUDE_CODE_CUSTOM_APP_ID }}
            private-key: ${{ secrets.CLAUDE_CODE_CUSTOM_APP_PRIVATE_KEY }}

      - name: Code Review with Claude
        uses: anthropics/claude-code-action@beta
        with:
          mode: experimental-review
          model: ${{ secrets.CLAUDE_CODE_CI_INFERENCE_PROFILE }}
          use_bedrock: "true"
          github_token: ${{ steps.app-token.outputs.token }}
          timeout_minutes: "30"
          custom_instructions: |
            Focus on:
            - Code quality and maintainability
            - Security vulnerabilities
            - Performance issues
            - Best practices and design patterns
            - Test coverage gaps
            Be constructive and provide specific suggestions for improvements.
            Use GitHub's suggestion format when proposing code changes.
