# See: https://github.com/anthropics/claude-code-action/blob/main/docs/cloud-providers.md
name: Claude Code
on:
  issue_comment:
    types: [created]
  pull_request_review:
    types: [submitted]
  pull_request_review_comment:
    types: [created]

jobs:
  claude-code:
    # Ignore review mentions: reviews are handled by the claude-review.yml workflow
    # Only run when the user mentions @claude in a comment, review, or review comment
    if: |
      !(github.event_name == 'issue_comment' && github.event.issue.pull_request && contains(github.event.comment.body, '@claude review'))
      && (
        github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')
        ||
        ((github.event_name == 'pull_request_review_comment' || github.event_name == 'issue_comment') && contains(github.event.comment.body, '@claude'))
      )
    permissions:
      contents: read
      pull-requests: read
      issues: read
      id-token: write
    runs-on:
      - runs-on=${{ github.run_id }}
      - runner=2cpu-linux-x64
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 1


    - name: Configure AWS Credentials (OIDC)
      uses: aws-actions/configure-aws-credentials@v4
      with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE_ARN }}
          aws-region: us-east-1

    - name: Generate GitHub App token
      id: app-token
      uses: actions/create-github-app-token@v2
      with:
          app-id: ${{ secrets.CLAUDE_CODE_CUSTOM_APP_ID }}
          private-key: ${{ secrets.CLAUDE_CODE_CUSTOM_APP_PRIVATE_KEY }}

    - uses: anthropics/claude-code-action@beta
      with:
          model: ${{ secrets.CLAUDE_CODE_CI_INFERENCE_PROFILE }}
          use_bedrock: "true"
          github_token: ${{ steps.app-token.outputs.token }}
          # ... other configuration
